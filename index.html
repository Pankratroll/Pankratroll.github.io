<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Instagram • Login</title>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="styles.css">
</head>
<body>
 <main class="main-container">
   <div class="content-wrapper">
     <div class="phone-image-container">
       <img class="phone-screenshot" src="instagram-login-page.png" alt="Instagram screenshot">
     </div>
     <div class="forms-container">
       <div class="card login-box">
         <i style="background-image:url('logo.png');width:175px;height:51px;display:inline-block;"></i>
         <form class="login-form">
           <div class="input-container"><input type="text" placeholder="Phone number, username, or email"></div>
           <div class="input-container"><input type="password" placeholder="Password"></div>
           <button type="submit" class="login-button">Log in</button>
         </form>
         <div class="separator"><div class="line"></div><div class="text">OR</div><div class="line"></div></div>
         <button class="facebook-login">Log in with Facebook</button>
         <a href="#" class="forgot-password">Forgot password?</a>
       </div>
       <div class="card signup-box">
         <span>Don't have an account?</span> <a href="#">Sign up</a>
       </div>
     </div>
   </div>
 </main>
 <footer class="page-footer">
   <div class="footer-links"><a href="#">About</a><a href="#">Help</a><a href="#">Privacy</a></div>
   <span>© 2025 Instagram from Meta</span>
 </footer>
</body>
</html>
